name: Deploy to Cloud Run

on:
  workflow_run:
    workflows: ["Build and Push API Image"]
    types:
      - completed
    branches:
      - main

env:
  GCP_PROJECT: oldschoolrunescapetool
  REGION: us-central1
  REGISTRY_REGION: us-central1  # Set independently if the Artifact Registry repo is in a different region

jobs:
  deploy:
    name: Deploy via OpenTofu
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    # Gated by the "production" GitHub Environment.
    # Configure required reviewers at:
    #   Settings → Environments → production → Required reviewers
    environment: production

    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: OpenTofu Init
        run: tofu init

      - name: OpenTofu Plan
        run: tofu plan -var="project_id=${{ env.GCP_PROJECT }}" -var="region=${{ env.REGION }}" -var="registry_region=${{ env.REGISTRY_REGION }}" -var="image_tag=${{ github.event.workflow_run.head_sha }}" -out=tfplan

      - name: OpenTofu Apply
        run: tofu apply -auto-approve tfplan
