name: Deploy to Cloud Run

on:
  workflow_run:
    workflows: ["Build and Push API Image"]
    types:
      - completed
    branches:
      - main

env:
  GCP_PROJECT: oldschoolrunescapetool
  REGION: us-central1
  REGISTRY_REGION: us-central1  # Set independently if the Artifact Registry repo is in a different region
  # Set to true in repo/environment variables when deploying to a brand-new project
  # that needs its GCP APIs enabled for the first time. Requires the WIF SA to hold
  # roles/serviceusage.serviceUsageAdmin. Safe to leave false once APIs are enabled.
  MANAGE_APIS: ${{ vars.MANAGE_APIS || 'false' }}

jobs:
  deploy:
    name: Deploy via OpenTofu
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    # Gated by the "production" GitHub Environment.
    # Configure required reviewers at:
    #   Settings → Environments → production → Required reviewers
    environment: production

    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: OpenTofu Init
        run: tofu init

      - name: Import existing Artifact Registry repository
        # Adopts a pre-existing repository into Tofu state so apply doesn't
        # attempt to recreate it and get a 409. Safe to re-run — import is a
        # no-op (exit 0) if the resource is already tracked in state.
        run: |
          tofu import \
            -var="project_id=${{ env.GCP_PROJECT }}" \
            -var="region=${{ env.REGION }}" \
            -var="registry_region=${{ env.REGISTRY_REGION }}" \
            -var="manage_apis=${{ env.MANAGE_APIS }}" \
            -var="image_tag=${{ github.event.workflow_run.head_sha }}" \
            google_artifact_registry_repository.api \
            "projects/${{ env.GCP_PROJECT }}/locations/${{ env.REGISTRY_REGION }}/repositories/osrs-api" \
          || true

      - name: OpenTofu Plan
        run: tofu plan -var="project_id=${{ env.GCP_PROJECT }}" -var="region=${{ env.REGION }}" -var="registry_region=${{ env.REGISTRY_REGION }}" -var="manage_apis=${{ env.MANAGE_APIS }}" -var="image_tag=${{ github.event.workflow_run.head_sha }}" -out=tfplan

      - name: OpenTofu Apply
        run: tofu apply -auto-approve tfplan
